<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tsb — toTimedelta</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    a { color: var(--accent); }
    h1 { color: var(--accent); margin-bottom: 0.5rem; }
    h2 { margin-top: 0; margin-bottom: 0.5rem; font-size: 1.25rem; }
    p { color: #8b949e; margin-bottom: 1rem; }
    code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.3rem;
      padding: 0.1rem 0.4rem;
    }
    .back { margin-bottom: 2rem; display: inline-block; }
    .subtitle { margin-bottom: 1.5rem; }

    #playground-loading {
      position: fixed; inset: 0;
      background: rgba(13, 17, 23, 0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000; gap: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #playground-status { color: #8b949e; font-size: 0.95rem; }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section p { margin-bottom: 0.75rem; }

    .playground-block { margin-top: 0.75rem; }
    .playground-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #1c2128;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 0.5rem 0.5rem 0 0;
      padding: 0.4rem 0.75rem;
    }
    .playground-label {
      font-size: 0.75rem; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .playground-actions { display: flex; gap: 0.5rem; }
    .playground-actions button {
      background: transparent; color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      padding: 0.25rem 0.7rem;
      font-size: 0.8rem; cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: background 0.15s, border-color 0.15s;
    }
    .playground-actions button:hover:not(:disabled) {
      background: rgba(88, 166, 255, 0.1);
      border-color: var(--accent);
    }
    .playground-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    .playground-run { font-weight: 600; }

    .playground-editor {
      display: block; width: 100%; min-height: 80px;
      background: #0d1117; color: var(--text);
      border: 1px solid var(--border);
      border-top: none; border-bottom: none;
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.875rem; line-height: 1.55;
      resize: vertical; outline: none;
      tab-size: 2; white-space: pre; overflow-x: auto;
    }
    .playground-editor:focus {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .playground-output {
      background: #1c2333;
      border: 1px solid var(--border);
      border-radius: 0 0 0.5rem 0.5rem;
      padding: 0.75rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.85rem; color: #8b949e;
      white-space: pre-wrap; min-height: 2rem;
      word-break: break-word;
    }
    .playground-output.active { color: var(--green); border-color: var(--green); }
    .playground-output.error { color: var(--red); border-color: var(--red); }
    .playground-hint {
      font-size: 0.75rem; color: #484f58;
      margin-top: 0.35rem; text-align: right;
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      color: #8b949e;
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <div id="playground-loading">
    <div class="spinner"></div>
    <div id="playground-status">Initializing playground…</div>
  </div>

  <a class="back" href="index.html">← Back to roadmap</a>
  <h1>toTimedelta</h1>
  <p class="subtitle"><a href="index.html">← tsb playground</a></p>

  <div class="section">
    <h2>Quick examples</h2>
    <div class="playground-block">
      <div class="playground-header">
        <span class="playground-label">TypeScript</span>
        <div class="playground-actions">
          <button class="playground-run" disabled>▶ Run</button>
          <button class="playground-reset">↺ Reset</button>
        </div>
      </div>
      <textarea class="playground-editor" spellcheck="false">import { toTimedelta, Timedelta, formatTimedelta, Series } from "tsb";

// Scalar — various string formats
console.log(toTimedelta("1 days 02:03:04"));       // Timedelta(93_784_000 ms)
console.log(toTimedelta("01:30:00"));              // Timedelta(5_400_000 ms)
console.log(toTimedelta("P1DT2H3M4S"));            // ISO 8601
console.log(toTimedelta("1h 30m 20s 500ms"));      // human-readable

// Scalar — numeric
console.log(toTimedelta(1_000_000_000));           // default unit "ns" → 1000 ms
console.log(toTimedelta(5000, { unit: "ms" }));    // 5000 ms
console.log(toTimedelta(2, { unit: "D" }));        // 2 days

// Missing values
console.log(toTimedelta(null));                    // null
console.log(toTimedelta("nope", { errors: "coerce" })); // null
console.log(toTimedelta("nope", { errors: "ignore" })); // "nope" (unchanged)

// Timedelta arithmetic
const a = toTimedelta("1h") as Timedelta;
const b = toTimedelta("30m") as Timedelta;
console.log(a.add(b).toString());          // "0 days 01:30:00"
console.log(a.subtract(b).totalMs);        // 1_800_000

// Array
console.log(toTimedelta(["1h", "30m", null]));
// =&gt; [Timedelta(3_600_000), Timedelta(1_800_000), null]

// Series
const s = new Series({ data: ["1h", "30m", null] });
console.log(toTimedelta(s));
// =&gt; Series&lt;Timedelta | null&gt; with dtype=timedelta

// formatTimedelta
formatTimedelta(new Timedelta(86_400_000 + 3_661_000));
// =&gt; "1 day 01:01:01"</textarea>
      <div class="playground-output">Click ▶ Run to execute</div>
      <div class="playground-hint">Ctrl+Enter to run · Tab to indent</div>
    </div>
  </div>

  <div class="section">
    <h2>Python / pandas equivalent</h2>
    <div class="playground-block">
      <div class="playground-header">
        <span class="playground-label">TypeScript</span>
        <div class="playground-actions">
          <button class="playground-run" disabled>▶ Run</button>
          <button class="playground-reset">↺ Reset</button>
        </div>
      </div>
      <textarea class="playground-editor" spellcheck="false">
import pandas as pd

# Scalar
pd.to_timedelta("1 days 02:03:04")
pd.to_timedelta("01:30:00")
pd.to_timedelta("P1DT2H3M4S")
pd.to_timedelta(5000, unit="ms")

# Array / Series
pd.to_timedelta(["1h", "30m", None])
s = pd.Series(["1h", "30m", None])
pd.to_timedelta(s)

# Timedelta arithmetic
pd.Timedelta("1h") + pd.Timedelta("30m")</textarea>
      <div class="playground-output">Click ▶ Run to execute</div>
      <div class="playground-hint">Ctrl+Enter to run · Tab to indent</div>
    </div>
  </div>

  <footer>
    <p>
      <a href="index.html">tsb playground</a> ·
      Built by <a href="https://github.com/githubnext/autoloop">Autoloop</a>
    </p>
  </footer>

  <script type="module" src="playground-runtime.js"></script>
</body>
</html>
